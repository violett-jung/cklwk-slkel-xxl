<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>합격 타이머</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding-top: 50px; }
        .container { max-width: 650px; margin: auto; background: #1e1e1e; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid #333; }
        #period { font-size: 2.8rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        .subject-ncs { color: #ff79c6; }      /* 1~5교시: 분홍색 */
        .subject-mgmt { color: #50fa7b; }     /* 6~12교시: 초록색 */
        .subject-law { color: #bd93f9; }      /* 13교시: 보라색 */
        .subject-rest { color: #f1fa8c; }     /* 휴식/식사: 연한 노란색 */
        #timer { font-size: 8rem; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; color: #fff; }
        #real-time { font-size: 1.2rem; color: #888; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .progress-bar { width: 100%; height: 10px; background: #333; margin: 25px auto; border-radius: 5px; overflow: hidden; }
        #progress-inner { width: 0%; height: 100%; background: currentColor; transition: width 1s linear; }
        #next-info { font-size: 1rem; color: #666; }
        #mute-notice { font-size: 0.8rem; color: #ff5555; margin-top: 10px; }
    </style>
</head>
<body onclick="enableAudio()">
    <div class="container">
        <div id="period">화면을 클릭하면 소리가 활성화됩니다</div>
        <div id="timer">00:00</div>
        <div class="progress-bar"><div id="progress-inner"></div></div>
        <div id="next-info">일정을 확인하고 있습니다.</div>
        <div id="mute-notice">⚠️ 소리를 들으려면 화면을 한 번 클릭하세요!</div>
        
        <div id="real-time">
            <span id="date-display"></span><br>
            <span id="clock-display" style="font-size: 1.5rem; color: #bbb;"></span>
        </div>
    </div>

    <script>
        let lastPeriod = "";
        let audioCtx = null;

        // 비프음 발생 함수
        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 주파수 880Hz (높은 '라')
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function enableAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('mute-notice').style.display = 'none';
                playBeep(); // 활성화 확인용 소리
            }
        }

        const schedule = [
            { name: "1교시 (NCS)", start: "04:00", end: "05:15", type: "ncs" },
            { name: "휴식", start: "05:15", end: "05:20", type: "rest" },
            { name: "2교시 (NCS)", start: "05:20", end: "06:35", type: "ncs" },
            { name: "휴식", start: "06:35", end: "06:40", type: "rest" },
            { name: "3교시 (NCS)", start: "06:40", end: "07:55", type: "ncs" },
            { name: "간식 및 휴식", start: "07:55", end: "08:10", type: "rest" },
            { name: "4교시 (NCS)", start: "08:10", end: "09:25", type: "ncs" },
            { name: "휴식", start: "09:25", end: "09:30", type: "rest" },
            { name: "5교시 (NCS)", start: "09:30", end: "10:45", type: "ncs" },
            { name: "휴식", start: "10:45", end: "10:50", type: "rest" },
            { name: "6교시 (경영학)", start: "10:50", end: "12:05", type: "mgmt" },
            { name: "점심시간", start: "12:05", end: "12:35", type: "rest" },
            { name: "7교시 (경영학)", start: "12:35", end: "13:50", type: "mgmt" },
            { name: "휴식", start: "13:50", end: "13:55", type: "rest" },
            { name: "8교시 (경영학)", start: "13:55", end: "15:10", type: "mgmt" },
            { name: "휴식", start: "15:10", end: "15:15", type: "rest" },
            { name: "9교시 (경영학)", start: "15:15", end: "16:30", type: "mgmt" },
            { name: "휴식", start: "16:30", end: "16:35", type: "rest" },
            { name: "10교시 (경영학)", start: "16:35", end: "17:50", type: "mgmt" },
            { name: "저녁시간", start: "17:50", end: "18:50", type: "rest" },
            { name: "11교시 (경영학)", start: "18:50", end: "20:05", type: "mgmt" },
            { name: "휴식", start: "20:05", end: "20:10", type: "rest" },
            { name: "12교시 (경영학)", start: "20:10", end: "21:25", type: "mgmt" },
            { name: "휴식", start: "21:25", end: "21:30", type: "rest" },
            { name: "13교시 (법령)", start: "21:30", end: "22:45", type: "law" }
        ];

        function timeToSecond(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 3600 + m * 60;
        }

        function update() {
            const now = new Date();
            const currSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            document.getElementById('date-display').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });

            let current = schedule.find(s => currSec >= timeToSecond(s.start) && currSec < timeToSecond(s.end));
            
            if (current) {
                if (lastPeriod !== current.name) {
                    playBeep(); // 교시가 바뀌면 비프음 재생
                    lastPeriod = current.name;
                }

                const total = timeToSecond(current.end) - timeToSecond(current.start);
                const remain = timeToSecond(current.end) - currSec;
                const progress = ((total - remain) / total) * 100;
                const mins = Math.floor(remain / 60);
                const secs = remain % 60;

                const periodEl = document.getElementById('period');
                periodEl.innerText = current.name;
                periodEl.className = `subject-${current.type}`;
                document.getElementById('progress-inner').style.color = getComputedStyle(periodEl).color;
                document.getElementById('progress-inner').style.width = progress + "%";
                document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                document.getElementById('next-info').innerText = `종료 시간: ${current.end}`;
                
                if (current.type !== 'rest' && now.getMinutes() % 5 === 0 && now.getSeconds() === 0) {
                    document.body.style.background = "#332200";
                    setTimeout(() => document.body.style.background = "#121212", 2000);
                }
            } else {
                lastPeriod = "idle";
                document.getElementById('period').innerText = "현재는 휴식 중입니다";
                document.getElementById('period').className = "subject-rest";
                document.getElementById('timer').innerText = "OFF";
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
