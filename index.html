<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KORAIL 합격 페이스메이커</title>
    <style>
        /* 아이폰 최적화 스타일 (CSS) */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --ncs-color: #ff79c6;   /* 1~5교시: 분홍 */
            --mgmt-color: #50fa7b;  /* 6~12교시: 초록 */
            --law-color: #bd93f9;   /* 13교시: 보라 */
            --rest-color: #f1fa8c;  /* 휴식/식사: 노랑 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 아이폰 하단 바 영역 확보 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 90%;
            max-width: 400px; /* 아이폰 플러스/맥스 모델 고려 */
            background-color: var(--container-bg);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* 교시 및 과목 표시 (크게) */
        #period {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
            word-break: keep-all; /* 단어 단위 줄바꿈 */
        }

        /* 과목별 색상 클래스 */
        .subject-ncs { color: var(--ncs-color); }
        .subject-mgmt { color: var(--mgmt-color); }
        .subject-law { color: var(--law-color); }
        .subject-rest { color: var(--rest-color); }

        /* 타이머 숫자 (매우 크게) */
        #timer {
            font-size: 7.5rem;
            font-weight: 900;
            margin: 10px 0;
            font-variant-numeric: tabular-nums; /* 숫자 폭 고정 */
            letter-spacing: -4px;
            color: #fff;
            line-height: 1;
        }

        /* 진행 바 */
        .progress-bar {
            width: 100%;
            height: 12px;
            background-color: #333;
            margin: 25px 0;
            border-radius: 6px;
            overflow: hidden;
        }
        #progress-inner {
            width: 0%;
            height: 100%;
            background-color: currentColor; /* 상위 요소 색상 상속 */
            transition: width 1s linear;
        }

        /* 현재 시간 및 날짜 (작게) */
        #real-time {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 20px;
            line-height: 1.6;
        }
        #clock-display {
            font-size: 1.5rem;
            color: #bbb;
            font-weight: 600;
        }

        /* 처음 실행 시 터치 안내 */
        #start-notice {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body onclick="enableAudio()">
    <div id="start-notice">화면을 터치하여<br>페이스메이커 시작</div>

    <div class="container">
        <div id="period">대기 중</div>
        <div id="timer">00:00</div>
        
        <div class="progress-bar">
            <div id="progress-inner"></div>
        </div>

        <div id="real-time">
            <span id="date-display"></span><br>
            <span id="clock-display"></span>
        </div>
    </div>

    <script>
        // 자바스크립트 로직 (이전과 동일, 토요일 인식 포함)
        let lastPeriod = "";
        let audioCtx = null;

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 주파수 (Hz)
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); // 볼륨
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function enableAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // 안내 화면 숨기기
            document.getElementById('start-notice').style.display = 'none';
            playBeep(); // 시작 알림
        }

        const fullSchedule = [
            { name: "1교시 (NCS)", start: "04:00", end: "05:15", type: "ncs" },
            { name: "휴식", start: "05:15", end: "05:20", type: "rest" },
            { name: "2교시 (NCS)", start: "05:20", end: "06:35", type: "ncs" },
            { name: "휴식", start: "06:35", end: "06:40", type: "rest" },
            { name: "3교시 (NCS)", start: "06:40", end: "07:55", type: "ncs" },
            { name: "간식 및 휴식", start: "07:55", end: "08:10", type: "rest" },
            { name: "4교시 (NCS)", start: "08:10", end: "09:25", type: "ncs" },
            { name: "휴식", start: "09:25", end: "09:30", type: "rest" },
            { name: "5교시 (NCS)", start: "09:30", end: "10:45", type: "ncs" },
            { name: "휴식", start: "10:45", end: "10:50", type: "rest" },
            { name: "6교시 (경영학)", start: "10:50", end: "12:05", type: "mgmt" },
            { name: "점심시간", start: "12:05", end: "12:35", type: "rest" },
            { name: "7교시 (경영학)", start: "12:35", end: "13:50", type: "mgmt" },
            { name: "휴식", start: "13:50", end: "13:55", type: "rest" },
            { name: "8교시 (경영학)", start: "13:55", end: "15:10", type: "mgmt" },
            { name: "휴식", start: "15:10", end: "15:15", type: "rest" },
            { name: "9교시 (경영학)", start: "15:15", end: "16:30", type: "mgmt" },
            { name: "휴식", start: "16:30", end: "16:35", type: "rest" },
            { name: "10교시 (경영학)", start: "16:35", end: "17:50", type: "mgmt" },
            { name: "저녁시간", start: "17:50", end: "18:50", type: "rest" },
            { name: "11교시 (경영학)", start: "18:50", end: "20:05", type: "mgmt" },
            { name: "휴식", start: "20:05", end: "20:10", type: "rest" },
            { name: "12교시 (경영학)", start: "20:10", end: "21:25", type: "mgmt" },
            { name: "휴식", start: "21:25", end: "21:30", type: "rest" },
            { name: "13교시 (법령)", start: "21:30", end: "22:45", type: "law" }
        ];

        function timeToSecond(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 3600 + m * 60;
        }

        function update() {
            const now = new Date();
            const isSaturday = now.getDay() === 6; // 6 = 토요일
            const currSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            // 날짜 및 시간 표시 업데이트
            document.getElementById('date-display').innerText = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });

            // 토요일은 10교시 종료(17:50)까지만 필터링
            const todaySchedule = isSaturday ? fullSchedule.filter(s => timeToSecond(s.end) <= timeToSecond("17:50")) : fullSchedule;
            
            // 현재 교시 찾기
            let current = todaySchedule.find(s => currSec >= timeToSecond(s.start) && currSec < timeToSecond(s.end));
            
            const periodEl = document.getElementById('period');
            const timerEl = document.getElementById('timer');
            const progressInnerEl = document.getElementById('progress-inner');

            if (current) {
                // 교시가 바뀌었을 때만 비프음 재생
                if (lastPeriod !== current.name) {
                    if (lastPeriod !== "") playBeep(); 
                    lastPeriod = current.name;
                }

                // 남은 시간 계산
                const total = timeToSecond(current.end) - timeToSecond(current.start);
                const remain = timeToSecond(current.end) - currSec;
                const progress = ((total - remain) / total) * 100;
                const mins = Math.floor(remain / 60);
                const secs = remain % 60;

                // 화면 업데이트
                periodEl.innerText = current.name;
                periodEl.className = `subject-${current.type}`;
                progressInnerEl.style.color = getComputedStyle(periodEl).color; // 과목 색상 상속
                progressInnerEl.style.width = progress + "%";
                timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            } else {
                lastPeriod = "idle";
                periodEl.innerText = isSaturday && currSec >= timeToSecond("17:50") ? "토요일 일과 종료!" : "일과 외 시간";
                periodEl.className = "subject-rest";
                progressInnerEl.style.width = "0%";
                timerEl.innerText = "--:--";
            }
        }

        // 1초마다 업데이트
        setInterval(update, 1000);
        update(); // 즉시 실행
    </script>
</body>
</html>
