<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KORAIL 페이스메이커</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --ncs-color: #ff79c6;
            --mgmt-color: #50fa7b;
            --law-color: #bd93f9;
            --rest-color: #f1fa8c;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container {
            width: 90%; max-width: 400px;
            background-color: var(--container-bg);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid #333;
        }
        #period { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; }
        .subject-ncs { color: var(--ncs-color); }
        .subject-mgmt { color: var(--mgmt-color); }
        .subject-law { color: var(--law-color); }
        .subject-rest { color: var(--rest-color); }
        #timer { font-size: 7.5rem; font-weight: 900; margin: 10px 0; color: #fff; line-height: 1; }
        .progress-bar { width: 100%; height: 12px; background-color: #333; margin: 25px 0; border-radius: 6px; overflow: hidden; }
        #progress-inner { width: 0%; height: 100%; background-color: currentColor; transition: width 1s linear; }
        #real-time { font-size: 1.1rem; color: #888; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        #clock-display { font-size: 1.5rem; color: #bbb; font-weight: 600; }
        #start-notice {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>
    <div id="start-notice" onclick="enableAudio()">화면을 한 번 터치하면<br>타이머가 시작됩니다</div>
    <div class="container">
        <div id="period">대기 중</div>
        <div id="timer">00:00</div>
        <div class="progress-bar"><div id="progress-inner"></div></div>
        <div id="real-time">
            <span id="date-display"></span><br>
            <span id="clock-display"></span>
        </div>
    </div>

    <script>
        let lastPeriod = "";
        let audioCtx = null;

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function enableAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-notice').style.display = 'none';
            playBeep();
            // 모든 클릭 이벤트를 제거하여 이후 터치 시 소음 방지
            document.body.onclick = null;
        }

        const fullSchedule = [
            { name: "1교시 (NCS)", start: "04:00", end: "05:15", type: "ncs" },
            { name: "휴식", start: "05:15", end: "05:20", type: "rest" },
            { name: "2교시 (NCS)", start: "05:20", end: "06:35", type: "ncs" },
            { name: "휴식", start: "06:35", end: "06:40", type: "rest" },
            { name: "3교시 (NCS)", start: "06:40", end: "07:55", type: "ncs" },
            { name: "간식 및 휴식", start: "07:55", end: "08:10", type: "rest" },
            { name: "4교시 (NCS)", start: "08:10", end: "09:25", type: "ncs" },
            { name: "휴식", start: "09:25", end: "09:30", type: "rest" },
            { name: "5교시 (NCS)", start: "09:30", end: "10:45", type: "ncs" },
            { name: "휴식", start: "10:45", end: "10:50", type: "rest" },
            { name: "6교시 (경영학)", start: "10:50", end: "12:05", type: "mgmt" },
            { name: "점심시간", start: "12:05", end: "12:35", type: "rest" },
            { name: "7교시 (경영학)", start: "12:35", end: "13:50", type: "mgmt" },
            { name: "휴식", start: "13:50", end: "13:55", type: "rest" },
            { name: "8교시 (경영학)", start: "13:55", end: "15:10", type: "mgmt" },
            { name: "휴식", start: "15:10", end: "15:15", type: "rest" },
            { name: "9교시 (경영학)", start: "15:15", end: "16:30", type: "mgmt" },
            { name: "휴식", start: "16:30", end: "16:35", type: "rest" },
            { name: "10교시 (경영학)", start: "16:35", end: "17:50", type: "mgmt" },
            { name: "저녁시간", start: "17:50", end: "18:50", type: "rest" },
            { name: "11교시 (경영학)", start: "18:50", end: "20:05", type: "mgmt" },
            { name: "휴식", start: "20:05", end: "20:10", type: "rest" },
            { name: "12교시 (경영학)", start: "20:10", end: "21:25", type: "mgmt" },
            { name: "휴식", start: "21:25", end: "21:30", type: "rest" },
            { name: "13교시 (법령)", start: "21:30", end: "22:45", type: "law" }
        ];

        function timeToSecond(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 3600 + m * 60;
        }

        function update() {
            const now = new Date();
            const isSaturday = now.getDay() === 6;
            const currSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            document.getElementById('date-display').innerText = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });

            const todaySchedule = isSaturday ? fullSchedule.filter(s => timeToSecond(s.end) <= timeToSecond("17:50")) : fullSchedule;
            let current = todaySchedule.find(s => currSec >= timeToSecond(s.start) && currSec < timeToSecond(s.end));
            
            const periodEl = document.getElementById('period');
            const timerEl = document.getElementById('timer');
            const progressInnerEl = document.getElementById('progress-inner');

            if (current) {
                if (lastPeriod !== current.name) {
                    if (lastPeriod !== "" && lastPeriod !== "idle") playBeep();
                    lastPeriod = current.name;
                }
                const total = timeToSecond(current.end) - timeToSecond(current.start);
                const remain = timeToSecond(current.end) - currSec;
                const progress = ((total - remain) / total) * 100;
                periodEl.innerText = current.name;
                periodEl.className = `subject-${current.type}`;
                progressInnerEl.style.color = getComputedStyle(periodEl).color;
                progressInnerEl.style.width = progress + "%";
                timerEl.innerText = `${Math.floor(remain / 60).toString().padStart(2, '0')}:${(remain % 60).toString().padStart(2, '0')}`;
            } else {
                lastPeriod = "idle";
                periodEl.innerText = isSaturday && currSec >= timeToSecond("17:50") ? "토요일 일과 종료!" : "일과 외 시간";
                periodEl.className = "subject-rest";
                progressInnerEl.style.width = "0%";
                timerEl.innerText = "--:--";
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
